name: proverif

# Runs the Phase-18 gate G-14 ProVerif applied-pi model (proof/ratchet-model.pv)
# and uploads the REAL tool output (per-query RESULT lines) as an artifact for
# human cryptographer review.  Manual trigger only.
on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    # plain bash (NO -e): we manage failures explicitly so the apt->opam fallback
    # and the `tee` of a query-FALSE verdict do not abort the job.
    shell: bash

jobs:
  proverif:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      OPAMYES: "1"
      OPAMCONFIRMLEVEL: unsafe-yes   # let opam depext run `sudo apt-get` for GTK2 (lablgtk)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ProVerif (apt -> opam fallback)
        run: |
          set -x
          # --- Path 1: apt.  ProVerif is NOT in the Ubuntu archive, so this is
          #     expected to fall through; we try it per the gate instructions. ---
          if sudo apt-get update && sudo apt-get install -y proverif; then
            echo "INSTALLED_VIA=apt" >> "$GITHUB_ENV"
            echo "apt provided proverif (unexpected but fine)."
            exit 0
          fi
          echo "apt has no 'proverif' package (expected); falling back to opam (official distribution)."

          # --- Path 2: opam.  Install opam ALONE (a single-package apt call so a
          #     bad sibling name can never sink it).  GTK2 dev libs for lablgtk are
          #     installed by opam's depext (OPAMCONFIRMLEVEL=unsafe-yes), and we
          #     also pre-install the known-good one explicitly as a belt-and-braces. ---
          sudo apt-get install -y opam
          sudo apt-get install -y m4 pkg-config libgtk2.0-dev || true

          # init with a < 5.0 OCaml (lablgtk conflicts with ocaml >= 5.0).
          opam init -y --disable-sandboxing --compiler=4.14.2 --bare || opam init -y --disable-sandboxing --bare
          opam switch create proverif 4.14.2 || opam switch set proverif || true
          eval "$(opam env --switch=proverif --set-switch 2>/dev/null || opam env)"
          opam --version
          ocaml -version || true

          # depext + build proverif.  --confirm-level lets opam call sudo apt for
          # system deps (conf-gtk2 -> libgtk2.0-dev) non-interactively.
          opam install -y --confirm-level=unsafe-yes proverif

          echo "INSTALLED_VIA=opam" >> "$GITHUB_ENV"
          # persist ONLY the opam-relevant env vars (KEY=value) into $GITHUB_ENV
          # so later steps find `proverif` on PATH without re-evaluating opam env.
          opam env --switch=proverif --set-switch | sed -n "s/^\([A-Za-z_][A-Za-z0-9_]*\)='\(.*\)'; export .*/\1=\2/p" >> "$GITHUB_ENV"

      - name: Show ProVerif version
        run: |
          set -x
          which proverif || { echo "proverif not on PATH"; exit 1; }
          # ProVerif prints its banner/version on a bare invocation or -help.
          proverif 2>&1 | head -3 || true

      - name: Run ProVerif on the ratchet model
        id: run
        run: |
          set -x
          which proverif || { echo "proverif missing; cannot run"; exit 1; }
          # Capture full stdout+stderr; the `|| true` ensures a query-FALSE verdict
          # (proverif exit != 0) does NOT abort the step -- we still upload output.
          proverif proof/ratchet-model.pv 2>&1 | tee proverif-output.txt || true
          echo "----- RESULT / summary lines -----"
          grep -E '^(RESULT|Verification summary|--------)' proverif-output.txt \
            || echo "(no RESULT lines -- likely a parse error; see full artifact)"

      - name: Upload ProVerif output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proverif-output
          path: proverif-output.txt
          if-no-files-found: warn
