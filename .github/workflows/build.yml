name: build-webrtc-aes256-aar

# Builds the LiveKit/webrtc-sdk fork of libwebrtc (M144) with the AES-256
# FrameCryptor patch -> Android AAR (arm64-v8a). Free public-repo runner: a big
# LVM volume is mounted at /home/runner/webrtc (maximize-build-space) and EVERY
# heavy thing (depot_tools, cipd cache, all build caches, the checkout, out/)
# lives there - the ~14GB root fs is NOT used for build data (that was the v1
# OOM-on-disk: depot_tools .cipd_bin filled root).

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Android ABI(s), space separated"
        default: "arm64-v8a"
      webrtc_ref:
        description: "webrtc-sdk/webrtc branch/tag"
        default: "m144_release"

permissions:
  contents: write

env:
  WEBRTC_DIR: /home/runner/webrtc
  CIPD_CACHE_DIR: /home/runner/webrtc/.cipd
  XDG_CACHE_HOME: /home/runner/webrtc/.cache
  PIP_CACHE_DIR: /home/runner/webrtc/.pipcache
  VPYTHON_VIRTUALENV_ROOT: /home/runner/webrtc/.vpython
  DEPOT_TOOLS_UPDATE: "0"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 4096
          swap-size-mb: 12288
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          build-mount-path: '/home/runner/webrtc'

      - name: Checkout this repo (patch + workflow)
        uses: actions/checkout@v4
        with:
          path: ctrl

      - name: Prep dirs on the big volume
        run: |
          set -euo pipefail
          sudo chown -R "$USER" "$WEBRTC_DIR"
          mkdir -p "$CIPD_CACHE_DIR" "$XDG_CACHE_HOME" "$PIP_CACHE_DIR" "$VPYTHON_VIRTUALENV_ROOT"
          df -h "$WEBRTC_DIR" /

      - name: Install depot_tools (on the big volume)
        run: |
          set -euo pipefail
          git clone --depth 1 https://chromium.googlesource.com/chromium/tools/depot_tools.git "$WEBRTC_DIR/depot_tools"
          echo "$WEBRTC_DIR/depot_tools" >> "$GITHUB_PATH"

      - name: gclient config + sync (Android, shallow)
        working-directory: /home/runner/webrtc
        run: |
          set -euo pipefail
          cat > .gclient <<EOF
          solutions = [{
            "name": "src",
            "url": "https://github.com/webrtc-sdk/webrtc.git@${{ github.event.inputs.webrtc_ref }}",
            "deps_file": "DEPS",
            "managed": False,
            "custom_deps": {},
          }]
          target_os = ["android", "unix"]
          EOF
          echo "::group::gclient sync"
          gclient sync --no-history --shallow --nohooks
          echo "::endgroup::"
          echo "::group::runhooks"
          gclient runhooks
          echo "::endgroup::"
          du -sh src 2>/dev/null || true
          df -h "$WEBRTC_DIR" /

      - name: Apply AES-256 FrameCryptor patch
        working-directory: /home/runner/webrtc/src
        run: |
          set -euo pipefail
          echo "=== BEFORE ==="
          grep -n "ratchet_salt, 128)" api/crypto/frame_crypto_transformer.h || true
          git apply -v "$GITHUB_WORKSPACE/ctrl/aes256-framecryptor.patch"
          echo "=== AFTER ==="
          grep -n "password.size() == 32 ? 256 : 128" api/crypto/frame_crypto_transformer.h

      - name: Build AAR
        working-directory: /home/runner/webrtc/src
        run: |
          set -euo pipefail
          vpython3 ./tools_webrtc/android/build_aar.py \
            --build-dir out/aar \
            --output "$GITHUB_WORKSPACE/libwebrtc-aes256.aar" \
            --arch ${{ github.event.inputs.arch }} \
            --extra-gn-args 'is_component_build=false rtc_include_tests=false is_debug=false enable_dsyms=false rtc_libvpx_build_vp9=true use_goma=false rtc_enable_symbol_export=true rtc_build_examples=false rtc_use_h264=true use_rtti=true libcxx_abi_unstable=false use_custom_libcxx=false use_clang_modules=false is_java_debug=false'
          ls -lh "$GITHUB_WORKSPACE/libwebrtc-aes256.aar"

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: libwebrtc-aes256-aar
          path: libwebrtc-aes256.aar
          if-no-files-found: error
